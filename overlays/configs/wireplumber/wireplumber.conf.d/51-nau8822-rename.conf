monitor.alsa.rules = [
  {
    matches = [
      {
        api.alsa.card.longname = "On-board Analog NAU8822"
        media.class = "Audio/Device"
      }
    ]
    actions = {
      update-props = {
        device.description = "NAU8822 Audio"
        device.nick        = "NAU8822"
      }
    }
  },
  {
    matches = [
      {
        alsa.id = "2a620000.sai-nau8822-hifi nau8822-hifi-0"
        media.class = "Audio/Sink"
      }
    ]
    actions = {
      update-props = {
        node.description = "On-board NAU8822 Analog Output"
        node.nick = "NAU8822 Playback"
      }
    }
  },
  {
    matches = [
      {
        alsa.id = "2a620000.sai-nau8822-hifi nau8822-hifi-0"
        media.class = "Audio/Source"
      }
    ]
    actions = {
      update-props = {
        node.description = "On-board NAU8822 Analog Input"
        node.nick = "NAU8822 Capture"
      }
    }
  }
]
