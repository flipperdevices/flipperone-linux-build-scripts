  monitor.alsa.rules = [
    {
      matches = [
        {
          api.alsa.card.longname = "realtek,rt5616-codec"
          media.class = "Audio/Device"
        }
      ]
      actions = {
        update-props = {
          device.description = "RT5616 Audio"
          device.nick        = "RT5616"
        }
      }
    },
    {
      matches = [
        {
          alsa.id = "2a620000.sai-rt5616-aif1 rt5616-aif1-0"
          media.class = "Audio/Sink"
        }
      ]
      actions = {
        update-props = {
          node.description = "On-board RT5616 Analog Output"
          node.nick = "RT5616 Playback"
        }
      }
    },
    {
      matches = [
        {
          alsa.id = "2a620000.sai-rt5616-aif1 rt5616-aif1-0"
          media.class = "Audio/Source"
        }
      ]
      actions = {
        update-props = {
          node.description = "On-board RT5616 Analog Input"
          node.nick = "RT5616 Capture"
        }
      }
    }
  ]
