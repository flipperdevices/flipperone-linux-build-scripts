  monitor.alsa.rules = [
    {
      matches = [
        {
          api.alsa.card.longname = "On-board Analog ES8388"
          media.class = "Audio/Device"
        }
      ]
      actions = {
        update-props = {
          device.description = "ES8388 Audio"
          device.nick        = "ES8388"
        }
      }
    },
    {
      matches = [
        {
          alsa.id = "2a610000.sai-es8328-hifi-analog es8328-hifi-analog-0"
          media.class = "Audio/Sink"
        }
      ]
      actions = {
        update-props = {
          node.description = "On-board ES8388 Analog Output"
          node.nick = "ES8388 Playback"
        }
      }
    },
    {
      matches = [
        {
          alsa.id = "2a610000.sai-es8328-hifi-analog es8328-hifi-analog-0"
          media.class = "Audio/Source"
        }
      ]
      actions = {
        update-props = {
          node.description = "On-board ES8388 Analog Input"
          node.nick = "ES8388 Capture"
        }
      }
    }
  ]
