Syntax 3

SectionVerb {
	Value {
		MinBufferLevel 512
	}

	EnableSequence [
		cset "name='PCM Volume' 192"
		cset "name='Output 1 Playback Volume' 27"
		cset "name='Output 2 Playback Volume' 27"
		cset "name='Capture Digital Volume' 192"
		cset "name='Left Channel Capture Volume' 3"
		cset "name='Right Channel Capture Volume' 3"
		cset "name='Left Mixer Left Playback Switch' on"
		cset "name='Right Mixer Right Playback Switch' on"
		cset "name='Capture Mute' off"
		cset "name='Left PGA Mux' DifferentialL"
		cset "name='Right PGA Mux' DifferentialR"
		cset "name='OUT1 Switch' on"
		cset "name='OUT2 Switch' on"
	]
}

SectionDevice."Speaker" {
	Comment "Speaker"

	ConflictingDevice [
		"Headphones"
	]

	EnableSequence [
		cset "name='Speaker Switch' on"
	]

	DisableSequence [
		cset "name='Speaker Switch' off"
	]

	Value {
		PlaybackPriority 100
		PlaybackPCM "hw:${CardId}"
		PlaybackMixerElem "Output 2"
		PlaybackVolume "Output 2 Playback Volume"
	}
}

SectionDevice."Headphones" {
	Comment "Headphones"

	ConflictingDevice [
		"Speaker"
	]

	EnableSequence [
		cset "name='Headphones Switch' on"
	]

	DisableSequence [
		cset "name='Headphones Switch' off"
	]

	Value {
		PlaybackPriority 200
		PlaybackPCM "hw:${CardId}"
		PlaybackMixerElem "Output 1"
		PlaybackVolume "Output 1 Playback Volume"
		JackControl "Headphones Jack"
		JackHWMute "Speaker"
	}
}

SectionDevice."Mic" {
	Comment "Internal Microphone"

	ConflictingDevice [
		"Headset"
	]

	EnableSequence [
		cset "name='Differential Mux' Line 2"
		cset "name='Main Mic Switch' on"
	]

	DisableSequence [
		cset "name='Main Mic Switch' off"
	]

	Value {
		CapturePriority 100
		CapturePCM "hw:${CardId}"
		CaptureMixerElem "Capture Digital"
		CaptureVolume "Capture Digital Volume"
	}
}

SectionDevice."Headset" {
	Comment "Headset Microphone"

	ConflictingDevice [
		"Mic"
		"Speaker"
	]

	EnableSequence [
		cset "name='Differential Mux' Line 1"
		cset "name='Headset Mic Switch' on"
	]

	DisableSequence [
		cset "name='Headset Mic Switch' off"
	]

	Value {
		CapturePriority 200
		CapturePCM "hw:${CardId}"
		CaptureMixerElem "Capture Digital"
		CaptureVolume "Capture Digital Volume"
		JackControl "Headphones Jack"
		JackHWMute "Mic"
	}
}

