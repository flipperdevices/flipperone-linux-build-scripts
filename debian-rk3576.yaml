{{ $suite := or .suite "trixie" }}
{{ $variant := or .variant "minbase" }}
{{ $imagesize := or .imagesize "4GiB" }}
{{ $cmdline := or .cmdline "console=ttyS0,1500000n8" }}
{{ $kerneldir := or .kerneldir "prebuilt/linux" }}
{{ $timestamp := or .timestamp "current" }}
{{ $gitinfo := or .gitinfo "unknown" }}

architecture: arm64

actions:
  - action: mmdebstrap
    description: Bootstrap a base Debian {{ $suite }} system
    suite: {{ $suite }}
    variant: {{ $variant }}
    keyring: /usr/share/keyrings/debian-archive-keyring.gpg
    components:
      - main
      - contrib
      - non-free
      - non-free-firmware
    include:
      - adduser
      - alsa-ucm-conf
      - alsa-utils
      - apt-transport-https
      - bash-completion
      - bluez
      - bsdextrautils
      - bsdmainutils
      - build-essential
      - ca-certificates
      - curl
      - dmidecode
      - dnsmasq-base
      - drm-info
      - e2fsprogs
      - edid-decode
      - evtest
      - file
      - firmware-mediatek
      - firmware-misc-nonfree
      - firmware-realtek
      - gcc
      - git
      - glmark2-wayland
      - gpiod
      - i2c-tools
      - inetutils-telnet
      - initramfs-tools
      - iperf3
      - iproute2
      - iputils-ping
      - iw
      - iwd
      - kde-standard
      - kmscube
      - konsole
      - less
      - libdrm-tests
      - libubootenv-tool
      - libusb-1.0-0-dev
      - usb-modeswitch
      - links
      - linux-cpupower
      - linux-sysctl-defaults
      - lm-sensors
      - lshw
      - make
      - nano
      - openssh-server
      - p7zip
      - pciutils
      - plasma-mobile-core
      - powercap-utils
      - rfkill
      - rsync
      - sddm
      - sddm-theme-breeze
      - strace
      - sudo
      - sysstat
      - systemd
      - systemd-repart
      - systemd-resolved
      - systemd-sysv
      - systemd-timesyncd
      - systemsettings
      - tcpdump
      - traceroute
      - u-boot-menu
      - udev
      - unzip
      - usbutils
      - util-linux-extra
      - v4l-utils
      - vim-tiny
      - wget
      - wireless-regdb
      - wpasupplicant
      - zstd

  - action: run
    description: Enable systemd-networkd
    chroot: true
    command: systemctl enable systemd-networkd

  - action: run
    description: Add default user "user" without password
    chroot: true
    command: useradd -s /bin/bash -F -m user &&
             passwd --delete user &&
             gpasswd -a user sudo

  - action: download
    description: Download the most recent version of sbc-bench
    url: https://raw.githubusercontent.com/ThomasKaiser/sbc-bench/master/sbc-bench.sh
    name: sbc-bench

  - action: overlay
    description: Copy sbc-bench into root
    origin: sbc-bench
    destination: /usr/bin/sbc-bench.sh

  - action: run
    chroot: true
    command: chmod +x /usr/bin/sbc-bench.sh

  - action: overlay
    description: Copy Linux kernel packages into the target
    source: {{ $kerneldir }}
    destination: /var/cache/linux-kernel

  - action: overlay
    description: Overlay our config defaults
    source: overlays/configs
    destination: /etc

  - action: overlay
    description: Overlay our usr/local scripts
    source: overlays/usr/local
    destination: /usr/local

  - action: run
    description: Save build ID
    chroot: true
    command: |
      echo BUILD_ID={{ $timestamp }} >> /etc/os-release
      echo 'BUILD_GIT="{{ $gitinfo }}"' >> /etc/os-release

  - action: run
    description: Make dynamic hostname script executable and enable service
    chroot: true
    command: chmod +x /usr/local/bin/set-dynamic-hostname.sh && systemctl enable set-dynamic-hostname.service

  - action: run
    description: Make USB NCM gadget scripts executable
    chroot: true
    command: chmod +x /usr/local/bin/usb-ncm-gadget.sh

  - action: overlay
    description: Copy firmware files into the target
    source: overlays/firmware
    destination: /usr/lib/firmware

  - action: pack
    description: Save a tarball of the root filesystem
    file: debian-{{ $timestamp }}.tar.gz

  - action: image-partition
    imagename: debian-nobootloader-{{ $timestamp }}.img
    imagesize: {{ $imagesize }}
    partitiontype: gpt
    partitions:
      - name: loader
        fs: none
        start: 64s
        end: 16MiB
      - name: root
        fs: ext4
        start: 16MiB
        end: 100%
        flags: [ boot ]
    mountpoints:
      - mountpoint: /
        partition: root
        options: [ x-systemd.growfs ]

  - action: filesystem-deploy
    append-kernel-cmdline: {{ $cmdline }}

  - action: run
    description: Install Linux kernel packages inside the target
    chroot: true
    command: find /var/cache/linux-kernel -name linux-image-\* -a ! -name \*-dbg_\* -print0 | xargs -0 apt install
