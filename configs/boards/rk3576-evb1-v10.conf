# Rockchip RK3576 EVB1 v10 board configuration

BOARD="rk3576-evb1-v10"
BOARD_NAME="rk3576-evb1-v10"
BOARD_FULL_NAME="Rockchip RK3576 EVB1 v1.0"
BOARD_VENDOR="Rockchip"
BOARD_SOC="rk3576"

# U-Boot configuration
UBOOT_DEFCONFIG="rk3576-evb1-v10-rk3576_defconfig"
UBOOT_GIT="https://github.com/flipperdevices/u-boot.git"
UBOOT_BRANCH="rk3576"

# ARM Trusted Firmware
USE_BL31="opensource"
# Alternative: USE_BL31="vendor" for Rockchip binary BL31

# Device tree configuration
DTS_VENDOR_DIR="bsp/rk3576-evb1-v10"
DTS_BASE=""

# Available overlays
DTS_OVERLAYS="fan-pwm.dtso typec-base.dtso typec-dp-hdmi.dtso typec-dp.dtso typec-hdmi-dp.dtso"

# Storage support
SUPPORTS_EMMC=true
SUPPORTS_SD=true
SUPPORTS_UFS=false
SUPPORTS_SPI_FLASH=true

# Maskrom mode configuration
MASKROM_BUTTON=""
MASKROM_USB_PORT=""
MASKROM_NOTES=""

# Additional notes
BOARD_NOTES="Rockchip reference design evaluation board"
REFERENCE_BOARD=true
