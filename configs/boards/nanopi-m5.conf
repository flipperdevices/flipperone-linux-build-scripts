# FriendlyElec NanoPi M5 board configuration

BOARD="nanopi-m5"
BOARD_NAME="nanopi-m5"
BOARD_FULL_NAME="FriendlyElec NanoPi M5"
BOARD_VENDOR="FriendlyElec"
BOARD_SOC="rk3576"

# U-Boot configuration
UBOOT_DEFCONFIG="nanopi-m5-rk3576_defconfig"
UBOOT_GIT="https://github.com/flipperdevices/u-boot.git"
UBOOT_BRANCH="rk3576"

# ARM Trusted Firmware
USE_BL31="opensource"
# Alternative: USE_BL31="vendor" for Rockchip binary BL31

# Device tree configuration
DTS_VENDOR_DIR="bsp"
DTS_BASE=""

# Storage support
SUPPORTS_EMMC=true
SUPPORTS_SD=true
SUPPORTS_UFS=false
SUPPORTS_SPI_FLASH=true

# Maskrom mode configuration
MASKROM_BUTTON=""
MASKROM_USB_PORT=""
MASKROM_NOTES=""

# Additional notes
BOARD_NOTES="FriendlyElec compact board"
