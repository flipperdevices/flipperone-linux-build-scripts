# Firefly ROC-RK3576-PC board configuration

BOARD="roc-rk3576-pc"
BOARD_NAME="roc-rk3576-pc"
BOARD_FULL_NAME="Firefly ROC-RK3576-PC"
BOARD_VENDOR="Firefly"
BOARD_SOC="rk3576"

# U-Boot configuration
UBOOT_DEFCONFIG="roc-rk3576-pc-rk3576_defconfig"
UBOOT_GIT="https://source.denx.de/u-boot/u-boot.git"
UBOOT_BRANCH="master"

# ARM Trusted Firmware
USE_BL31="opensource"

# Device tree configuration
DTS_VENDOR_DIR="bsp"
DTS_BASE=""

# Storage support
SUPPORTS_EMMC=true
SUPPORTS_SD=true
SUPPORTS_UFS=false
SUPPORTS_SPI_FLASH=true

# Maskrom mode configuration
MASKROM_BUTTON=""
MASKROM_USB_PORT=""
MASKROM_NOTES=""

# Additional notes
BOARD_NOTES="Only RK3576 board supported by unmodified upstream U-boot as of August 2025"
UPSTREAM_SUPPORT=true
