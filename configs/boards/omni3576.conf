# Luckfox Omni3576 board configuration

BOARD="omni3576"
BOARD_NAME="omni3576"
BOARD_FULL_NAME="Luckfox Omni3576"
BOARD_VENDOR="Luckfox"
BOARD_SOC="rk3576"

# U-Boot configuration
UBOOT_DEFCONFIG="omni3576-rk3576_defconfig"
UBOOT_GIT="https://github.com/flipperdevices/u-boot.git"
UBOOT_BRANCH="rk3576"

# ARM Trusted Firmware
USE_BL31="opensource"
# Alternative: USE_BL31="vendor" for Rockchip binary BL31

# Device tree configuration
DTS_VENDOR_DIR="omni3576"
DTS_BASE="luckfox-omni3576.dts"

# Available overlays
DTS_OVERLAYS="luckfox-omni3576-cam.dtsi luckfox-omni3576-can.dtsi luckfox-omni3576-codec.dtsi luckfox-omni3576-display.dtsi luckfox-omni3576-dsi.dtsi luckfox-omni3576-hdmi.dtsi luckfox-omni3576-ir.dtsi luckfox-omni3576-pcie.dtsi luckfox-omni3576-usb-c.dtsi luckfox-omni3576-usb.dtsi luckfox-omni3576-wireless.dtsi"

# Storage support
SUPPORTS_EMMC=true
SUPPORTS_SD=true
SUPPORTS_UFS=false
SUPPORTS_SPI_FLASH=true

# Maskrom mode configuration
MASKROM_BUTTON=""
MASKROM_USB_PORT=""
MASKROM_NOTES=""

# Additional notes
BOARD_NOTES="Luckfox board with extensive device tree overlay support"
