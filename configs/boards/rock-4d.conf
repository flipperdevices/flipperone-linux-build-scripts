# Radxa Rock 4D board configuration
# https://docs.radxa.com/en/rock4/rock4d

BOARD="rock-4d"
BOARD_NAME="rock-4d"
BOARD_FULL_NAME="Radxa Rock 4D"
BOARD_VENDOR="Radxa"
BOARD_SOC="rk3576"

# U-Boot configuration
UBOOT_DEFCONFIG="rock-4d-rk3576_defconfig"
UBOOT_GIT="https://github.com/flipperdevices/u-boot.git"
UBOOT_BRANCH="rk3576"

# ARM Trusted Firmware
USE_BL31="opensource"
# Alternative: USE_BL31="vendor" for Rockchip binary BL31

# Device tree configuration
DTS_VENDOR_DIR="bsp"
DTS_BASE=""

# Storage support
SUPPORTS_EMMC=true
SUPPORTS_SD=true
SUPPORTS_UFS=false
SUPPORTS_SPI_FLASH=true

# Maskrom mode configuration
MASKROM_BUTTON="MASKROM button"
MASKROM_USB_PORT="Top USB 3.0 blue port"
MASKROM_NOTES="eMMC modules cannot be used together with onboard SPI flash (shared pins)"

# Additional notes
BOARD_NOTES="Supports USB Type-C to USB-A cable for flashing"
