# ArmSoM Sige5 board configuration
# https://docs.armsom.org/getting-start/flash-img

BOARD="sige5"
BOARD_NAME="sige5"
BOARD_FULL_NAME="ArmSoM Sige5"
BOARD_VENDOR="ArmSoM"
BOARD_SOC="rk3576"

# U-Boot configuration
UBOOT_DEFCONFIG="sige5-rk3576_defconfig"
UBOOT_GIT="https://source.denx.de/u-boot/contributors/kwiboo/u-boot.git"
UBOOT_BRANCH="rk3576"

# ARM Trusted Firmware
USE_BL31="opensource"
# Alternative: USE_BL31="vendor" for Rockchip binary BL31

# Device tree configuration
DTS_VENDOR_DIR="bsp"
DTS_BASE=""

# Storage support
SUPPORTS_EMMC=true
SUPPORTS_SD=true
SUPPORTS_UFS=false
SUPPORTS_SPI_FLASH=true

# Maskrom mode configuration
MASKROM_BUTTON="MASKROM button"
MASKROM_USB_PORT="Type-C OTG port (marked TYPEC on board)"
MASKROM_NOTES="Hold MASKROM button and apply power via Type-C DC IN"

# Additional notes
BOARD_NOTES="Requires alternative U-boot source tree from kwiboo"
