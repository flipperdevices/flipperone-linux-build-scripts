{{ $suite := or .suite "trixie" }}
{{ $variant := or .variant "minbase" }}
{{ $gitinfo := or .gitinfo "unknown" }}
{{ $testsdir := or .testsdir "prebuilt/tests" }}

architecture: arm64

actions:
  - action: mmdebstrap
    description: Bootstrap a base Debian {{ $suite }} system
    suite: {{ $suite }}
    variant: {{ $variant }}
    keyring: /usr/share/keyrings/debian-archive-keyring.gpg
    components:
      - main
      - contrib
      - non-free
      - non-free-firmware
    include:
      - acl
      - adduser
      - alsa-ucm-conf
      - alsa-utils
      - apt-transport-https
      - bash-completion
      - bc
      - bluedevil
      - bluez
      - bsdextrautils
      - bsdmainutils
      - build-essential
      - ca-certificates
      - cec-utils
      - cog
      - curl
      - device-tree-compiler
      - dmidecode
      - dnsmasq-base
      - drm-info
      - e2fsprogs
      - edid-decode
      - evtest
      - file
      - fio
      - firmware-misc-nonfree
      - firmware-realtek
      - gcc
      - git
      - glmark2-wayland
      - gpiod
      - i2c-tools
      - inetutils-telnet
      - initramfs-tools
      - iperf3
      - iproute2
      - iptables
      - iputils-ping
      - iw
      - iwd
      - kde-config-screenlocker
      - kde-spectacle
      - kde-standard
      - kmscube
      - konsole
      - kscreen
      - less
      - libcanberra-pulse
      - libdrm-tests
      - libtypec-utils
      - libubootenv-tool
      - libusb-1.0-0-dev
      - links
      - linux-cpupower
      - linux-sysctl-defaults
      - lm-sensors
      - locales
      - lshw
      - lsof
      - make
      - mesa-utils
      - modemmanager
      - nano
      - nftables
      - openssh-server
      - p7zip
      - pciutils
      - plasma-nm
      - plasma-systemmonitor
      - powercap-utils
      - powerdevil
      - python3-pandas
      - python3-plotly
      - rfkill
      - rsync
      - sddm
      - sddm-theme-breeze
      - strace
      - stress-ng
      - sudo
      - sysstat
      - systemd
      - systemd-repart
      - systemd-resolved
      - systemd-sysv
      - systemd-timesyncd
      - systemsettings
      - tcpdump
      - traceroute
      - u-boot-menu
      - udev
      - unzip
      - usb-modeswitch
      - usbutils
      - util-linux-extra
      - v4l-utils
      - vim-tiny
      - wget
      - wireless-regdb
      - wireplumber
      - wpasupplicant
      - zstd

  - action: run
    description: Generate en_US.UTF-8 locale
    chroot: true
    command: sed -i 's/^# en_US.UTF-8/en_US.UTF-8/' /etc/locale.gen && locale-gen

  - action: run
    description: Set default locale
    chroot: true
    command: echo "LANG=en_US.UTF-8" > /etc/default/locale

  - action: run
    description: Add default user "user" with password "user"
    chroot: true
    command: useradd -s /bin/bash -F -m user &&
             echo "user:user" | chpasswd &&
             gpasswd -a user sudo

  - action: run
    description: Create user's .bash_aliases
    chroot: true
    command: |
      echo "alias pastebin='curl --user-agent \"curl/7.74.0\" -F \"file=@-\" https://0x0.st'" >> /home/user/.bash_aliases
      chown user:user /home/user/.bash_aliases

  - action: run
    description: Add sbin directories to user's PATH
    chroot: true
    command: printf '\nexport PATH=$PATH:/usr/local/sbin:/usr/sbin:/sbin\n' >> /home/user/.bashrc

  - action: download
    description: Download the most recent version of sbc-bench
    url: https://raw.githubusercontent.com/ThomasKaiser/sbc-bench/master/sbc-bench.sh
    name: sbc-bench

  - action: overlay
    description: Copy sbc-bench into root
    origin: sbc-bench
    destination: /usr/bin/sbc-bench.sh

  - action: run
    chroot: true
    command: chmod +x /usr/bin/sbc-bench.sh

  - action: overlay
    description: Overlay our config defaults
    source: overlays/configs
    destination: /etc

  - action: overlay
    description: Overlay our usr/local scripts
    source: overlays/usr/local
    destination: /usr/local

  - action: overlay
    description: Overlay our usr/sbin files
    source: overlays/usr/sbin
    destination: /usr/sbin

  - action: overlay
    description: Overlay our usr/share files
    source: overlays/usr/share
    destination: /usr/share

  - action: run
    description: Save GIT info
    chroot: true
    command: |
      echo 'BUILD_GIT="{{ $gitinfo }}"' >> /etc/os-release

  - action: run
    description: Make dynamic hostname script executable and enable service
    chroot: true
    command: chmod +x /usr/local/bin/set-hostname-and-banner.sh && systemctl enable set-hostname-and-banner.service

  - action: run
    description: Make USB NCM gadget scripts executable and enable service
    chroot: true
    command: chmod +x /usr/local/bin/usb-ncm-gadget.sh && systemctl enable usb-ncm-gadget.service

  - action: run
    description: Enable iperf3 service to check network speed
    chroot: true
    command: systemctl enable iperf3

  - action: run
    description: Fix permissions on NetworkManager connection profiles
    chroot: true
    command: chmod 600 /etc/NetworkManager/system-connections/*.nmconnection

  - action: run
    description: Make u-boot-update script executable
    chroot: true
    command: chmod +x /usr/sbin/u-boot-update

  - action: run
    description: Remove /etc/machine-id and default /etc/motd
    chroot: true
    command: rm -f /etc/machine-id /etc/motd

  - action: run
    description: Switch to upstream signed regulatory.db
    chroot: true
    command: update-alternatives --set regulatory.db /lib/firmware/regulatory.db-upstream

  - action: overlay
    description: Copy test suite into the target
    source: {{ $testsdir }}
    destination: /rk3576-linux-tests

  - action: pack
    description: Save a tarball of the root filesystem
    file: debian-ospack.tar.gz
