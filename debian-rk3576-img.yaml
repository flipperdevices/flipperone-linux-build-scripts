{{ $sectorsize := or .sectorsize 512 }}
{{ $imagesize := or .imagesize "4GiB" }}
{{ $cmdline := or .cmdline "console=ttyS0,1500000n8" }}
{{ $buildid := or .buildid "current" }}

architecture: arm64
sectorsize: {{ $sectorsize }}

actions:
  - action: unpack
    description: Load a tarball of the root filesystem
    file: debian-{{ $buildid }}.tar.gz

  - action: image-partition
    imagename: debian-{{ $sectorsize }}-nobootloader-{{ $buildid }}.img
    imagesize: {{ $imagesize }}
    partitiontype: gpt
    partitions:
      - name: loader
        fs: none
        start: 32KiB
        end: 16MiB
      - name: root
        fs: ext4
        start: 16MiB
        end: 100%
        flags: [ boot ]
    mountpoints:
      - mountpoint: /
        partition: root
        options: [ x-systemd.growfs ]

  - action: filesystem-deploy
    append-kernel-cmdline: {{ $cmdline }}

  - action: run
    description: Install Linux kernel packages inside the target
    chroot: true
    command: find /var/cache/linux-kernel -name linux-image-\* -a ! -name \*-dbg_\* -print0 | xargs -0 apt install
