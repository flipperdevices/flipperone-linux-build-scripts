{{ $sectorsize := or .sectorsize 512 }}
{{ $imagesize := or .imagesize "4GiB" }}
{{ $kerneldir := or .kerneldir "prebuilt/linux" }}
{{ $cmdline := or .cmdline "audit=0 console=tty1 console=ttyS0,1500000n8" }}

architecture: arm64
sectorsize: {{ $sectorsize }}

actions:
  - action: unpack
    description: Load a tarball of the root filesystem
    file: debian-ospack.tar.gz

  - action: image-partition
    imagename: debian-nobootloader.img
    imagesize: {{ $imagesize }}
    partitiontype: gpt
    partitions:
      - name: loader
        fs: none
        start: 32KiB
        end: 16MiB
      - name: root
        fs: ext4
        start: 16MiB
        end: -1MiB
        flags: [ boot ]
    mountpoints:
      - mountpoint: /
        partition: root
        options: [ x-systemd.growfs ]

  - action: filesystem-deploy
    append-kernel-cmdline: {{ $cmdline }}

  - action: download
    description: Download the most recent version of Mediatek firmware
    url: http://ftp.debian.org/debian/pool/non-free-firmware/f/firmware-nonfree/firmware-mediatek_20260110-1_all.deb
    name: firmware-mediatek

  - action: install-deb
    description: Install Mediatek firmware into the target
    origin: firmware-mediatek

  - action: overlay
    description: Copy Linux kernel packages into the target
    source: {{ $kerneldir }}
    destination: /var/cache/linux-kernel

  - action: run
    description: Install Linux kernel packages inside the target
    chroot: true
    command: find /var/cache/linux-kernel -name linux-image-\*.deb -a ! -name \*-dbg_\* -print0 | xargs -0 apt install -y
